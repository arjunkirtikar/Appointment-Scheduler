<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Error — Scheduler</title>
    <link rel="stylesheet" th:href="@{/css/style.css}" />
</head>

<body>
    <div style="min-height:100vh; display:flex; align-items:center; justify-content:center;">
        <div style="text-align:center;">
            <div style="font-size:64px; margin-bottom:16px;">⚠️</div>
            <h2 style="color:#f87171; margin-bottom:8px;">Something went wrong</h2>
            <p style="color:#64748b; margin-bottom:24px;" th:text="${message}">
                An unexpected error occurred.
            </p>
            <a th:href="@{/appointments/calendar}" class="btn btn-primary">Go Home</a>
        </div>
    </div>
</body>

</html>
