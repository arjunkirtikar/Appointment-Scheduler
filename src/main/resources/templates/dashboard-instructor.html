<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>My Slots — Scheduler</title>
    <link rel="stylesheet" th:href="@{/css/style.css}" />
</head>

<body>
    <nav class="navbar">
        <span class="navbar-brand">Scheduler</span>
        <div class="navbar-links">
            <a th:href="@{/appointments/calendar}">Calendar</a>
            <a th:href="@{/appointments/groups}">Groups</a>
            <a th:href="@{/appointments/my-slots}">My Slots</a>
            <span class="navbar-user" sec:authentication="name"
                xmlns:sec="http://www.thymeleaf.org/extras/spring-security"></span>
            <form th:action="@{/logout}" method="post">
                <button type="submit" class="btn btn-ghost btn-sm">Logout</button>
            </form>
        </div>
    </nav>

    <div class="container">
        <h2 style="margin-bottom:24px; color:#e2e8f0;">My Appointment Slots</h2>

        <div th:if="${cancelError != null}" class="alert alert-error">
            ⚠️ <span th:text="${cancelError}"></span>
        </div>

        <!-- Stats -->
        <div class="stats-row">
            <div class="stat-card">
                <div class="stat-number" th:text="${slots.size()}">0</div>
                <div class="stat-label">Total Slots</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" th:text="${#lists.size(slots.?[booked == true])}">0</div>
                <div class="stat-label">Booked</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" th:text="${#lists.size(slots.?[booked == false])}">0</div>
                <div class="stat-label">Open</div>
            </div>
        </div>

        <div class="card">
            <h3>All Slots</h3>
            <div class="table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th>Date & Time</th>
                            <th>Duration</th>
                            <th>Type</th>
                            <th>Status</th>
                            <th>Booked By</th>
                            <th>Group</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="s : ${slots}">
                            <td th:text="${s.slotTime}"></td>
                            <td th:text="${s.durationMinutes} + ' min'"></td>
                            <td>
                                <span th:if="${s.groupAppointment}" class="badge badge-blue">Group</span>
                                <span th:unless="${s.groupAppointment}" class="badge badge-purple">Individual</span>
                            </td>
                            <td>
                                <span th:if="${s.booked}" class="badge badge-red">Booked</span>
                                <span th:unless="${s.booked}" class="badge badge-green">Open</span>
                            </td>
                            <td>
                                <span th:if="${s.studentUsername != null}" th:text="${s.studentUsername}"></span>
                                <span th:unless="${s.studentUsername != null}" style="color:#475569;">—</span>
                            </td>
                            <td>
                                <a th:if="${s.groupAppointment and s.groupId != null}"
                                    th:href="@{/appointments/groups/{id}(id=${s.groupId})}" class="badge badge-blue"
                                    style="cursor:pointer;">View Group</a>
                                <span th:unless="${s.groupAppointment}" style="color:#475569;">—</span>
                            </td>
                            <td>
                                <form th:action="@{/appointments/cancel/instructor/{id}(id=${s.id})}" method="post">
                                    <button type="submit" class="btn btn-danger btn-sm">Delete</button>
                                </form>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(slots)}">
                            <td colspan="7" style="text-align:center; color:#64748b; padding:24px;">
                                No slots yet. Click a date on the calendar to create slots.
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</body>

</html>
