<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Login</title>
    <style>
        body { font-family: Arial, sans-serif; display: flex; justify-content: center; margin-top: 100px; }
        .box { background: #f4f4f4; padding: 40px; border-radius: 8px; width: 300px; }
        input { width: 100%; padding: 8px; margin: 8px 0; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #4CAF50; color: white; border: none; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>
<div class="box">
    <h2>Appointment Scheduler</h2>
    <div th:if="${param.error}" style="color:red">Invalid username or password.</div>
    <form th:action="@{/login}" method="post">
        <input type="text" name="username" placeholder="Username" required/>
        <input type="password" name="password" placeholder="Password" required/>
        <button type="submit">Login</button>
    </form>
    <p style="font-size:12px; margin-top:16px;">
        Student: student1 / pass<br/>
        Instructor: prof1 / pass
    </p>
</div>
</body>
</html>
