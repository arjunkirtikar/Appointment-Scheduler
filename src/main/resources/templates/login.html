<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Login — Appointment Scheduler</title>
    <link rel="stylesheet" th:href="@{/css/style.css}" />
</head>

<body>
    <div class="login-wrap">
        <div class="login-card">
            <h1>📅 Scheduler</h1>
            <p>Sign in to manage your appointments</p>

            <div th:if="${param.error}" class="alert alert-error" style="margin-bottom:20px;">
                ⚠️ Invalid username or password.
            </div>

            <form th:action="@{/login}" method="post">
                <div class="form-group">
                    <label>Username</label>
                    <input class="form-control" type="text" name="username" placeholder="Enter username" required />
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input class="form-control" type="password" name="password" placeholder="Enter password" required />
                </div>
                <button type="submit" class="btn btn-primary" style="width:100%; margin-top:8px;">
                    Sign In →
                </button>
            </form>

            <div class="login-hint">
                <strong style="color:#94a3b8;">Demo Credentials</strong><br />
                🎓 Student: <code>student1</code> / <code>pass</code><br />
                👨‍🏫 Instructor: <code>prof1</code> / <code>pass</code>
            </div>
        </div>
    </div>
</body>

</html>
