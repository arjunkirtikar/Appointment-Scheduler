<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
  <title>Group Detail — Scheduler</title>
  <link rel="stylesheet" th:href="@{/css/style.css}" />
</head>

<body>
  <nav class="navbar">
    <span class="navbar-brand">Scheduler</span>
    <div class="navbar-links">
      <a th:href="@{/appointments/calendar}">Calendar</a>
      <a th:href="@{/appointments/groups}">Groups</a>
      <a th:href="@{/appointments/my-slots}">My Slots</a>
      <form th:action="@{/logout}" method="post">
        <button type="submit" class="btn btn-ghost btn-sm">Logout</button>
      </form>
    </div>
  </nav>

  <div class="container" style="max-width:600px;">
    <a th:href="@{/appointments/my-slots}" class="btn btn-ghost btn-sm" style="margin-bottom:20px;">← Back to My
      Slots</a>

    <div class="card">
      <div style="margin-bottom:20px;">
        <h2 style="color:#60a5fa; font-size:22px;" th:text="${group.groupName}"></h2>
        <p style="color:#64748b; font-size:13px; margin-top:6px;">
          Created by <strong th:text="${group.createdByUsername}"></strong>
        </p>
      </div>

      <div class="stats-row" style="margin-bottom:20px;">
        <div class="stat-card">
          <div class="stat-number" th:text="${group.memberList.size()}">0</div>
          <div class="stat-label">Members</div>
        </div>
      </div>

      <h3>Members</h3>
      <div style="display:flex; flex-wrap:wrap; gap:8px; margin-top:12px;">
        <span th:each="member : ${group.memberList}" class="member-tag">
          <span th:text="${member}"></span>
        </span>
        <span th:if="${#lists.isEmpty(group.memberList)}" style="color:#475569; font-size:14px;">No members yet.</span>
      </div>
    </div>
  </div>
</body>

</html>
